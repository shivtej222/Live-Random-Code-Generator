<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Live Random Code Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

:root{
--bg:#f5f5f5;
--card:#fff;
--text:#111;
--code:#f0f0f0;
}

body.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#fff;
--code:#2a2a2a;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
transition:.3s;
}

.container{
width:100%;
max-width:750px;
background:var(--card);
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-align:center;
}

.status-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:#facc15;
padding:10px 15px;
border-radius:12px;
font-weight:bold;
color:#000;
margin-bottom:12px;
}

.calendar-bar{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
background:#22c55e;
color:#fff;
padding:12px;
border-radius:12px;
font-weight:bold;
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

.code-box{
background:var(--code);
padding:25px;
border-radius:15px;
font-size:20px;
font-weight:bold;
word-break:break-all;
min-height:90px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.btn{
border:none;
padding:14px;
border-radius:14px;
font-size:15px;
font-weight:bold;
cursor:pointer;
color:#fff;
box-shadow:0 7px 0 rgba(0,0,0,.25);
transition:.15s;
}

.btn:active{
transform:translateY(5px);
box-shadow:0 2px 0 rgba(0,0,0,.25);
}

.generate{background:#16a34a;}
.copy{background:#2563eb;}
.theme{background:#d97706;}
.credit{background:#7e22ce;}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:12px 24px;
border-radius:30px;
opacity:0;
transition:.3s;
z-index:999;
}

.toast.show{
opacity:1;
bottom:40px;
}

.success{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#fff;
padding:25px;
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
text-align:center;
transition:.25s;
z-index:9999;
}

.success.show{
transform:translate(-50%,-50%) scale(1);
}

.tick{
width:90px;
height:90px;
border-radius:50%;
background:#16a34a;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
font-weight:bold;
color:#fff;
margin:auto;
}

.success p{
margin-top:12px;
font-weight:bold;
color:#16a34a;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:#fff;
padding:25px;
border-radius:20px;
max-width:350px;
width:100%;
text-align:center;
color:#000;
}

.modal-content button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#7e22ce;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="status-bar">
<span id="time">00:00:00</span>
<span>📶 📡 🔋</span>
</div>

<div class="calendar-bar">
<span>📅</span>
<span id="date">Loading...</span>
</div>

<h1>⚡ Live Random Code Generator</h1>

<div id="codeBox" class="code-box">
Generating...
</div>

<div class="buttons">
<button class="btn generate" onclick="generateCode()">⚡ Generate</button>
<button class="btn copy" onclick="copyCode()">📋 Copy</button>
<button id="themeBtn" class="btn theme" onclick="toggleTheme()">🌙 Dark</button>
<button class="btn credit" onclick="openCredit()">👨‍💻 Credit</button>
</div>

</div>

<div id="toast" class="toast"></div>

<div id="success" class="success">
<div class="tick">✓</div>
<p>Copied Successfully</p>
</div>

<div id="creditModal" class="modal">
<div class="modal-content">
<h2>👨‍💻 Developer Credit</h2>
<p><strong>Special Thanks To Code Creator</strong></p>
<p>Code Inventor</p>
<button onclick="closeCredit()">Close</button>
</div>
</div>

<script>

let currentCode="";

const AudioClass=window.AudioContext||window.webkitAudioContext;
const audio=new AudioClass();

function beep(freq=1000,duration=0.08){

try{

if(audio.state==="suspended"){
audio.resume();
}

const osc=audio.createOscillator();
const gain=audio.createGain();

osc.type="triangle";
osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audio.destination);

gain.gain.setValueAtTime(.12,audio.currentTime);
gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+duration
);

osc.start();
osc.stop(audio.currentTime+duration);

}catch(e){}

}

function updateDateTime(){

const now=new Date();

document.getElementById("time").textContent=
now.toLocaleTimeString();

document.getElementById("date").textContent=
now.toLocaleDateString(undefined,{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
});

}

setInterval(updateDateTime,1000);

function toast(msg){

const t=document.getElementById("toast");

t.textContent=msg;

t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2000);

}

function generateCode(){

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*";

let code="";

for(let i=0;i<24;i++){
code+=chars.charAt(
Math.floor(Math.random()*chars.length)
);
}

currentCode=code;

document.getElementById("codeBox").textContent=code;

beep(1000);

toast("New Random Code Generated");

}

function successPopup(){

const box=document.getElementById("success");

box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},1500);

}

function copyCode(){

const visibleCode=
document.getElementById("codeBox").textContent.trim();

if(!visibleCode || visibleCode==="Generating..."){
toast("Generate Code First");
return;
}

const visibleDate=
document.getElementById("date").textContent;

const visibleTime=
document.getElementById("time").textContent;

const text=
`Code: ${visibleCode}
Date: ${visibleDate}
Time: ${visibleTime}`;

function done(){
beep(1600);
setTimeout(()=>beep(2200),60);
successPopup();
toast("✓ Code Copied");
}

if(navigator.clipboard && window.isSecureContext){

navigator.clipboard.writeText(text)
.then(done)
.catch(fallbackCopy);

}else{
fallbackCopy();
}

function fallbackCopy(){

const area=document.createElement("textarea");

area.value=text;

document.body.appendChild(area);

area.focus();
area.select();

try{
document.execCommand("copy");
done();
}catch(err){
toast("Copy Failed");
}

document.body.removeChild(area);

}

}

function toggleTheme(){

document.body.classList.toggle("dark");

const btn=document.getElementById("themeBtn");

if(document.body.classList.contains("dark")){
btn.innerHTML="☀️ Light";
}else{
btn.innerHTML="🌙 Dark";
}

beep(700);

}

function openCredit(){

document.getElementById("creditModal").style.display="flex";

beep(500);

}

function closeCredit(){

document.getElementById("creditModal").style.display="none";

}

window.onclick=function(e){

const modal=document.getElementById("creditModal");

if(e.target===modal){
closeCredit();
}

};

window.onload=function(){

updateDateTime();

generateCode();

document.body.addEventListener("click",()=>{

if(audio.state==="suspended"){
audio.resume();
}

},{once:true});

};

</script>

</body>
</html>
